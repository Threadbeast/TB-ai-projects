name: Deploy analyzer

on:
  push:
    branches: [main]
    paths:
      - 'projects/hate-it-rate-analyzer/**'
      - '.github/workflows/deploy-analyzer.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for Workload Identity Federation

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  AR_REPO: tb-ai-projects
  SERVICE: tb-analyzer

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/${SERVICE}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE}:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: projects/hate-it-rate-analyzer
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="${{ steps.tags.outputs.sha_tag }}" \
            --platform=managed \
            --allow-unauthenticated \
            --set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest \
            --service-account="ai-projects@threadbeast-devops.iam.gserviceaccount.com" \
            --memory=1Gi \
            --cpu=1

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe "$SERVICE" \
              --project="$GCP_PROJECT_ID" --region="$GCP_REGION" \
              --format='value(status.url)')
          echo "### $SERVICE deployed 🚀" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: $URL" >> "$GITHUB_STEP_SUMMARY"
