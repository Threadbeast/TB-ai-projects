name: Deploy proxy

on:
  push:
    branches: [main]
    paths:
      - 'nginx/**'
      - '.github/workflows/deploy-proxy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  AR_REPO: tb-ai-projects
  SERVICE: tb-proxy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/${SERVICE}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE}:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: nginx
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}

      - name: Resolve upstream Cloud Run URLs
        id: upstreams
        run: |
          ANALYZER_URL=$(gcloud run services describe tb-analyzer \
              --project="$GCP_PROJECT_ID" --region="$GCP_REGION" \
              --format='value(status.url)')
          PIPELINE_URL=$(gcloud run services describe tb-pipeline \
              --project="$GCP_PROJECT_ID" --region="$GCP_REGION" \
              --format='value(status.url)')
          echo "analyzer_host=${ANALYZER_URL#https://}" >> "$GITHUB_OUTPUT"
          echo "pipeline_host=${PIPELINE_URL#https://}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="${{ steps.tags.outputs.sha_tag }}" \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="ANALYZER_UPSTREAM=${{ steps.upstreams.outputs.analyzer_host }},PIPELINE_UPSTREAM=${{ steps.upstreams.outputs.pipeline_host }},ANALYZER_SCHEME=https,PIPELINE_SCHEME=https" \
            --memory=256Mi \
            --cpu=1

      - name: Print public URL
        run: |
          URL=$(gcloud run services describe "$SERVICE" \
              --project="$GCP_PROJECT_ID" --region="$GCP_REGION" \
              --format='value(status.url)')
          echo "### Proxy deployed 🚀" >> "$GITHUB_STEP_SUMMARY"
          echo "Public URL: $URL" >> "$GITHUB_STEP_SUMMARY"
