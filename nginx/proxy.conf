# Use Docker's embedded DNS so upstream hostnames are resolved lazily at
# request time — this way the proxy starts cleanly even if backend containers
# aren't up yet or are restarting.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name localhost;

    # ── Landing page at / ────────────────────────────────────
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # ── Trailing-slash redirects ────────────────────────────
    location = /analyzer { return 301 /analyzer/; }
    location = /pipeline { return 301 /pipeline/; }

    # ── Hate It Rate Analyzer at /analyzer/ ──────────────────
    # Explicit rewrite strips the /analyzer prefix, so
    # /analyzer/api/* arrives at the backend as /api/*.
    # (proxy_pass with variables does NOT auto-strip prefixes.)
    location /analyzer/ {
        set $analyzer_upstream "hate-it-rate-analyzer:3000";
        rewrite ^/analyzer/(.*) /$1 break;
        proxy_pass http://$analyzer_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /analyzer;
        proxy_read_timeout 300s;
    }

    # ── Pipeline Viewer at /pipeline/ ────────────────────────
    # Explicit rewrite strips the /pipeline prefix.
    location /pipeline/ {
        set $pipeline_upstream "pipeline:80";
        rewrite ^/pipeline/(.*) /$1 break;
        proxy_pass http://$pipeline_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /pipeline;
    }
}
