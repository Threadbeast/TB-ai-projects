<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TB AI Projects</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f0;
        color: #1a1a2e;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
      }

      header {
        background: #1a1a2e;
        color: #fff;
        padding: 3rem 1.5rem;
        text-align: center;
      }

      h1 {
        font-size: 2.8rem;
        font-weight: 900;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: -0.02em;
        line-height: 1.05;
        margin-bottom: 0.5rem;
        max-width: 640px;
        margin-left: auto;
        margin-right: auto;
      }

      p.lead {
        color: rgba(255,255,255,0.6);
        margin-top: 0;
        font-size: 0.95rem;
        max-width: 640px;
        margin-left: auto;
        margin-right: auto;
      }

      .content {
        max-width: 640px;
        margin: 0 auto;
        padding: 0 1.5rem;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 2rem;
      }

      li {
        border: 1px solid #e0e0dc;
        border-radius: 8px;
        padding: 1.25rem 1.5rem;
        margin-bottom: 1rem;
        background: #fff;
        transition: border-color 0.2s;
      }

      li:hover {
        border-color: #1a1a2e;
      }

      li a {
        color: #1a1a2e;
        text-decoration: none;
        font-weight: 700;
        font-size: 1.05rem;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }

      li a:hover { text-decoration: underline; }

      li p {
        margin: 0.35rem 0 0;
        color: #777;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Threadbeast AI</h1>
      <p class="lead">Collection of internal AI tools</p>
    </header>
    <div class="content">
    <ul>
      <li>
        <a href="https://tb-analyzer-ogz6l7tv4q-uc.a.run.app/">Hate It Rate Analyzer</a>
        <p>Dashboard, report, and chat for hate-it-rate data.</p>
      </li>
      <li>
        <a href="https://tb-pipeline-ogz6l7tv4q-uc.a.run.app/">Pipeline Viewer</a>
        <p>Style profile and outfit recommendation pipeline viewer.</p>
      </li>
    </ul>
    </div>
  </body>
</html>
