# Cloud Build config for the `tb-pipeline` Cloud Run service.
#
# The pipeline Dockerfile runs the full 4-layer data pipeline at *build time*
# and therefore needs two BuildKit secrets:
#   - gcp_sa              → a service-account JSON with BigQuery read access
#   - anthropic_api_key   → plain-text Anthropic API key for the `claude` CLI
#
# Both are pulled from Secret Manager via `availableSecrets` and written to
# files, then passed to `docker build --secret id=...,src=...`. BuildKit is
# enabled with DOCKER_BUILDKIT=1.
#
# Prerequisites (one-time setup):
#   gcloud secrets create anthropic-api-key --data-file=- < anthropic-key.txt
#   gcloud secrets create gcp-sa-json       --data-file=- < gcp-sa.json
#   gcloud secrets add-iam-policy-binding anthropic-api-key \
#       --member="serviceAccount:$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')@cloudbuild.gserviceaccount.com" \
#       --role=roles/secretmanager.secretAccessor
#   (repeat for gcp-sa-json)
#
# Submit with:
#   gcloud builds submit --config=cloudbuild/pipeline.yaml \
#       --substitutions=_REGION=us-central1 .

substitutions:
  _REGION: us-central1
  _SERVICE: tb-pipeline
  _REPO: tb-ai-projects
  _IMAGE_TAG: latest

steps:
  # Stage the BuildKit secrets as files on the build worker.
  - id: stage-secrets
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        set -eu
        mkdir -p /workspace/_secrets
        printf '%s' "$$ANTHROPIC_API_KEY" > /workspace/_secrets/anthropic_api_key
        printf '%s' "$$GCP_SA_JSON"       > /workspace/_secrets/gcp_sa.json
        chmod 600 /workspace/_secrets/*
    secretEnv:
      - ANTHROPIC_API_KEY
      - GCP_SA_JSON

  - id: build
    name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --secret=id=anthropic_api_key,src=/workspace/_secrets/anthropic_api_key
      - --secret=id=gcp_sa,src=/workspace/_secrets/gcp_sa.json
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_IMAGE_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - projects/pipeline

  # Scrub staged secrets as soon as the build is done.
  - id: scrub-secrets
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - rm -rf /workspace/_secrets

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_IMAGE_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=/run/secrets/anthropic_api_key=anthropic-api-key:latest
      - --service-account=tb-pipeline@${PROJECT_ID}.iam.gserviceaccount.com
      - --memory=1Gi
      - --cpu=1

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/anthropic-api-key/versions/latest
      env: ANTHROPIC_API_KEY
    - versionName: projects/${PROJECT_ID}/secrets/gcp-sa-json/versions/latest
      env: GCP_SA_JSON

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_IMAGE_TAG}
